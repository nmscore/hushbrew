{% extends 'base.html' %}

{% block content %}
<h1>Brewed To Make You Smile</h1>

<!-- Filter Form -->
<form method="get" class="form-inline mb-4">
  <select name="category" class="form-control mr-2">
    <option value="">All Categories</option>
    {% for code, label in categories %}
      <option value="{{ code }}" {% if request.GET.category == code %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>

  <select name="temperature" class="form-control mr-2">
    <option value="">All Temperatures</option>
    <option value="Hot" {% if request.GET.temperature == 'Hot' %}selected{% endif %}>Hot</option>
    <option value="Cold" {% if request.GET.temperature == 'Cold' %}selected{% endif %}>Cold</option>
  </select>

  <input type="text" name="search" class="form-control mr-2" placeholder="Search coffee..." value="{{ search_query }}">
 
  <button type="submit" class="btn btn-outline-primary">
    🔍
  </button>
</form>


<!-- Product Cards -->
<div class="row">
    {% for coffee in coffee %}
        <div class="col-md-4 mb-4">
        <div class="card mb-4 shadow-sm h-100" style="width: 18rem;">
            <img src="{{ coffee.image.url }}" class="card-img-top" alt="{{ coffee.name }}">
            <div class="card-body">
                <h5 class="card-title">{{ coffee.name }}</h5>
                <p class="card-text"></p>${{ coffee.price }}</p>
                <p class="card-text"><small class="text-muted">{{ coffee.category }} - {{ coffee.temperature }}</small></p>
                <p class="card-text"><small class="text-muted">{{ coffee.description }}</small></p>  {# ✅ Use description from DB #}
                <a href="{% url 'add_to_cart' coffee.id %}" class="btn btn-success">Add to Cart</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
