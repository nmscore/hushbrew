{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .form-container {
        max-width: 450px;
        margin: 100px auto;
        padding: 0;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
    }

    .form-header {
        background-color: #2c2f34;
        color: #fff;
        padding: 20px;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        text-align: center;
        font-size: 24px;
        font-weight: 600;
    }

    .form-body {
        padding: 30px;
    }

    .form-body input {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    /* ✅ Add blue outline on focus */
    .form-body input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #2c2f34;
        color: #fff;
        font-weight: 500;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .btn-submit:hover {
        background-color: #1f2125;
    }
</style>

<div class="form-container">
    <div class="form-header">
        🔐 Login
    </div>
    <div class="form-body">
        <form method="POST">
            {% csrf_token %}
            <label class="font-weight-bold">Username:</label>
            <input type="text" name="username" required>

            <label class="font-weight-bold">Password:</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'forgot_password' %}" class="text-primary" style="text-decoration: none;">Forgot password?</a>
        </div>

        <div class="text-center mt-2">
            <span style="color: black;">Not a user?</span>
            <a href="{% url 'register' %}" class="text-primary" style="text-decoration: none;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
