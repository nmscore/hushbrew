{% extends 'base.html' %}

{% block content %}
<style>
    .form-container {
        max-width: 450px;
        margin: 100px auto;
        padding: 0;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
    }

    .form-header {
        background-color: #2c2f34;
        color: #fff;
        padding: 20px;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        text-align: center;
        font-size: 24px;
        font-weight: 600;
    }

    .form-body {
        padding: 30px;
    }

    .form-body input {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .form-body input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 0.1rem #007bff;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #2c2f34;
        color: #fff;
        font-weight: 500;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .btn-submit:hover {
        background-color: #1f2125;
    }

    .info-text {
        font-size: 14px;
        text-align: center;
        color: #333;
    }

    .info-text a {
        color: #007bff;
        text-decoration: none;
    }

    .info-text a:hover {
        text-decoration: underline;
    }
</style>

<div class="form-container">
    <div class="form-header">
        🔐 Forgot Password
    </div>
    <div class="form-body">
        <form method="POST">
            {% csrf_token %}
            <label class="font-weight-bold">Email or Phone Number:</label>
            <input type="text" name="identifier" required placeholder="Enter your email or phone number">

            {% if otp_sent %}
                <label class="font-weight-bold">Enter OTP:</label>
                <input type="text" name="otp" placeholder="Enter code sent to your email/phone" required>
            {% endif %}

            <button type="submit" class="btn-submit">
                {% if otp_sent %}Verify OTP{% else %}Send OTP{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
